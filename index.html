<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Say Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Heading -->
    <h1>Simon Say Game</h1>
    <h2>Enter any key to start the game</h2>
    <div class="container">
        <div class="line-one">
            <div class="box yellow" id="yellow" type="button"></div>
        <div class="box green" id="green" type="button"></div>
        </div>
        
        <div class="line-two">
            <div class="box red" id="red" type="button"></div>
            <div class="box blue" id="blue" type="button"></div>
        </div>
        
    </div>
    <script src="app.js"></script>
</body>
</html>
